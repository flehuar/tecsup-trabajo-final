name: tecsup-pedido-comida

services:
  postgres:
    image: postgres:16
    container_name: tecsup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.1
    container_name: tecsup-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tecsup-kafka-ui
    restart: unless-stopped
    ports:
      - "8086:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tecsup-kafka-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    environment:
      SERVER_PORT: 8087
      SECURITY_JWT_SECRET: tecsup-pedido-comida-secret-key-32chars
    depends_on:
      kafka:
        condition: service_started

  usuario-service:
    build:
      context: .
      dockerfile: usuario-service/Dockerfile
    container_name: usuario-service
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/usuarios_db
      SPRING_DATASOURCE_USERNAME: usuarios_user
      SPRING_DATASOURCE_PASSWORD: usuarios_pass
      SECURITY_JWT_SECRET: tecsup-pedido-comida-secret-key-32chars
    depends_on:
      postgres:
        condition: service_healthy

  catalogo-service:
    build:
      context: .
      dockerfile: catalogo-service/Dockerfile
    container_name: catalogo-service
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/catalogo_db
      SPRING_DATASOURCE_USERNAME: catalogo_user
      SPRING_DATASOURCE_PASSWORD: catalogo_pass
      SECURITY_JWT_SECRET: tecsup-pedido-comida-secret-key-32chars
    depends_on:
      postgres:
        condition: service_healthy

  pedido-service:
    build:
      context: .
      dockerfile: pedido-service/Dockerfile
    container_name: pedido-service
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pedidos_db
      SPRING_DATASOURCE_USERNAME: pedidos_user
      SPRING_DATASOURCE_PASSWORD: pedidos_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECURITY_JWT_SECRET: tecsup-pedido-comida-secret-key-32chars
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  pago-service:
    build:
      context: .
      dockerfile: pago-service/Dockerfile
    container_name: pago-service
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pagos_db
      SPRING_DATASOURCE_USERNAME: pagos_user
      SPRING_DATASOURCE_PASSWORD: pagos_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECURITY_JWT_SECRET: tecsup-pedido-comida-secret-key-32chars
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  entrega-service:
    build:
      context: .
      dockerfile: entrega-service/Dockerfile
    container_name: entrega-service
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/entregas_db
      SPRING_DATASOURCE_USERNAME: entregas_user
      SPRING_DATASOURCE_PASSWORD: entregas_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECURITY_JWT_SECRET: tecsup-pedido-comida-secret-key-32chars
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      SERVER_PORT: 8080
      SECURITY_JWT_SECRET: tecsup-pedido-comida-secret-key-32chars
    depends_on:
      auth-service:
        condition: service_started
      usuario-service:
        condition: service_started
      catalogo-service:
        condition: service_started
      pedido-service:
        condition: service_started
      pago-service:
        condition: service_started
      entrega-service:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  postgres_data:
