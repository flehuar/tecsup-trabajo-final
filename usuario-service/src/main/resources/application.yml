server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:55432/usuarios_db}
    username: ${SPRING_DATASOURCE_USERNAME:usuarios_user}
    password: ${SPRING_DATASOURCE_PASSWORD:usuarios_pass}
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:tecsup-pedido-comida-secret-key-32chars}
